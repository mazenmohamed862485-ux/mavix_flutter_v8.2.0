workflows:
  android-release:
    name: Android Release (APK)
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - mazenmohamad862485@gmail.com
        notify:
          success: true
          failure: true
